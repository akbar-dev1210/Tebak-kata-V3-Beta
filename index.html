<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game Cari Kata Nusantara Pro</title>
    <style>
        :root {
            --bg-color: #1a1a2e;
            --container-color: #16213e;
            --accent-color: #0f3460;
            --text-color: #ffffff;
            --highlight-color: #e94560;
        }
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            text-align: center;
            padding: 20px;
            transition: background 0.3s, color 0.3s;
        }
        .container {
            background-color: var(--container-color);
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 750px;
            transition: background 0.3s;
        }
        h1 { color: var(--highlight-color); margin-bottom: 20px; }
        button, select {
            background-color: var(--accent-color); color: var(--text-color); border: none;
            padding: 12px 25px; margin: 8px; border-radius: 8px;
            font-size: 16px; cursor: pointer; width: 80%; max-width: 300px;
            transition: 0.3s;
        }
        button:hover { background-color: var(--highlight-color); color: white; }
        select { width: auto; max-width: 200px; text-align: center; }
        
        .game-layout {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        @media (min-width: 650px) {
            .game-layout { flex-direction: row; justify-content: center; align-items: flex-start; }
        }

        .grid-container {
            display: grid;
            gap: 4px;
            background-color: var(--accent-color);
            padding: 8px;
            border-radius: 8px;
        }
        .cell {
            width: 32px; height: 32px;
            background-color: var(--bg-color);
            display: flex; justify-content: center; align-items: center;
            font-weight: bold; font-size: 15px; cursor: pointer;
            border-radius: 4px; transition: 0.2s;
        }
        .cell.selected { background-color: var(--highlight-color); color: white; }
        .cell.found { background-color: #4caf50; color: white; }

        .word-list {
            text-align: left; background: var(--accent-color); padding: 15px;
            border-radius: 8px; min-width: 180px; max-height: 400px; overflow-y: auto;
        }
        .word-item { margin: 6px 0; font-size: 14px; font-weight: 500; color: #a8dadc; }
        .word-item.crossed { text-decoration: line-through; color: #4caf50; opacity: 0.6; }

        #game-screen, #settings-screen, #win-screen, #gameover-screen { display: none; }
        .level-title { font-size: 22px; font-weight: bold; color: var(--highlight-color);}
        .info-bar { display: flex; justify-content: space-between; margin-bottom: 15px; font-weight: bold; background: rgba(0,0,0,0.2); padding: 10px; border-radius: 8px;}
        
        /* Tema Radio Button */
        .theme-options { display: flex; flex-direction: column; align-items: center; gap: 10px; margin: 20px 0; }
        .theme-btn { width: 150px; padding: 10px; border-radius: 5px; cursor: pointer; border: 2px solid transparent; text-align: center; font-weight: bold;}
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <div id="lobby-screen" class="container">
        <h1>Cari Kata<br>Nusantara</h1>
        
        <label for="timeSelect" style="font-weight: bold;">Pilih Batas Waktu:</label><br>
        <select id="timeSelect">
            <option value="60">1 Menit</option>
            <option value="120" selected>2 Menit</option>
            <option value="180">3 Menit</option>
            <option value="300">5 Menit</option>
        </select>
        <br><br>

        <button onclick="startGame()">Mulai Game</button>
        <button onclick="showSettings()">Pengaturan</button>
        <button onclick="exitGame()">Keluar</button>
    </div>

    <div id="settings-screen" class="container">
        <h1>Pengaturan Tema</h1>
        <div class="theme-options">
            <div class="theme-btn" style="background:#1a1a2e; color:#fff; border-color:#fff;" onclick="changeTheme('dark')">Hitam Gelap</div>
            <div class="theme-btn" style="background:#4a4a4a; color:#fff;" onclick="changeTheme('grey')">Abu-Abu</div>
            <div class="theme-btn" style="background:#f0f2f5; color:#333;" onclick="changeTheme('white')">Putih Terang</div>
        </div>
        <button onclick="toggleMusic()" id="musicBtn">Matikan Musik</button><br>
        <button onclick="backToLobby()">Kembali ke Lobi</button>
    </div>

    <div id="game-screen" class="container">
        <div class="info-bar">
            <span id="levelDisplay">Level 1</span>
            <span id="timerDisplay">Waktu: 00:00</span>
        </div>
        <div style="color: #a8dadc; margin-bottom: 10px;" id="hintDisplay">Tema: -</div>
        
        <div class="game-layout">
            <div id="grid" class="grid-container"></div>
            <div class="word-list">
                <h3 style="margin-top:0; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom:5px;">Daftar Kata:</h3>
                <div id="wordsToFind"></div>
            </div>
        </div>
        <br>
        <button onclick="clearSelection()" style="width:auto; padding:8px 15px; font-size:14px;">Hapus Pilihan</button>
        <button onclick="backToLobbyWithConfirm()" style="width:auto; padding:8px 15px; font-size:14px;">Lobi</button>
    </div>

    <div id="gameover-screen" class="container">
        <h1 style="color: #ff4a4a;">Game Over! ❌</h1>
        <p>Sayang sekali, waktu kamu telah habis.</p>
        <button onclick="startGame()">Mulai Ulang</button>
        <button onclick="backToLobby()">Kembali ke Menu</button>
    </div>

    <div id="win-screen" class="container">
        <h1>Selamat! 🎉</h1>
        <p>Kamu luar biasa! Semua level dari yang mudah sampai yang tersulit berhasil kamu pecahkan!</p>
        <button onclick="backToLobby()">Main Lagi</button>
    </div>

    <script>
        // Bank Data Kata: Jumlah kata meningkat dari 3 sampai 8 kata per level. Ukuran grid naik progresif sampai maks 14x14.
        const levels = [
            { level: 1, size: 8, theme: "Benda Sekolah", words: ["BUKU", "PENA", "MEJA"] },
            { level: 2, size: 9, theme: "Nama Buah", words: ["APEL", "JERUK", "PISANG", "MELON"] },
            { level: 3, size: 10, theme: "Hewan Darat", words: ["SINGA", "GAJAH", "KUCING", "RUSA", "KUDA"] },
            { level: 4, size: 11, theme: "Warna", words: ["MERAH", "KUNING", "HIJAU", "BIRU", "HITAM", "PUTIH"] },
            { level: 5, size: 12, theme: "Transportasi", words: ["KAPAL", "MOTOR", "MOBIL", "KERETA", "PESAWAT", "SEPEDA"] },
            { level: 6, size: 12, theme: "Nama Kota", words: ["JAKARTA", "BANDUNG", "MEDAN", "SURABAYA", "PADANG", "BOGOR", "MALANG"] },
            { level: 7, size: 13, theme: "Organ Tubuh", words: ["JANTUNG", "LAMBUNG", "PARU", "GINJAL", "HATI", "MATA", "OTAK", "KULIT"] },
            { level: 8, size: 13, theme: "Sejarah Nusantara", words: ["CANDI", "KERAJAAN", "PRASASTI", "ARCA", "PAHLAWAN", "SUMPAH", "PROKLAMASI"] },
            { level: 9, size: 14, theme: "Teknologi", words: ["KOMPUTER", "INTERNET", "ROBOT", "GAWAI", "SOFTWARE", "DATALAB", "LOGIKA", "SISTEM"] },
            { level: 10, size: 14, theme: "Astronomi", words: ["MERKURIUS", "VENUS", "BUMI", "MARS", "JUPITER", "SATURNUS", "URANUS", "NEPTUNUS"] }
        ];

        let currentLevelIndex = 0;
        let isMusicPlaying = false;
        let selectedLetters = [];
        let foundWords = [];
        let gridMatrix = [];
        
        // Sistem Timer
        let timeRemaining = 0;
        let timerInterval = null;
        let selectedDuration = 120; // Default 2 menit

        const bgMusic = document.getElementById("bgMusic");

        // Ganti Tema Warna Background
        function changeTheme(theme) {
            const root = document.documentElement;
            if (theme === 'dark') {
                root.style.setProperty('--bg-color', '#1a1a2e');
                root.style.setProperty('--container-color', '#16213e');
                root.style.setProperty('--accent-color', '#0f3460');
                root.style.setProperty('--text-color', '#ffffff');
            } else if (theme === 'grey') {
                root.style.setProperty('--bg-color', '#3a3a3a');
                root.style.setProperty('--container-color', '#4a4a4a');
                root.style.setProperty('--accent-color', '#616161');
                root.style.setProperty('--text-color', '#ffffff');
            } else if (theme === 'white') {
                root.style.setProperty('--bg-color', '#f0f2f5');
                root.style.setProperty('--container-color', '#ffffff');
                root.style.setProperty('--accent-color', '#e2e8f0');
                root.style.setProperty('--text-color', '#1a1a2e');
            }
        }

        function hideAllScreens() {
            document.getElementById("lobby-screen").style.display = "none";
            document.getElementById("game-screen").style.display = "none";
            document.getElementById("settings-screen").style.display = "none";
            document.getElementById("win-screen").style.display = "none";
            document.getElementById("gameover-screen").style.display = "none";
        }

        function backToLobby() {
            clearInterval(timerInterval);
            hideAllScreens();
            document.getElementById("lobby-screen").style.display = "block";
        }

        function backToLobbyWithConfirm() {
            if(confirm("Apakah Anda yakin ingin keluar ke lobi? Progress saat ini akan hilang.")) {
                backToLobby();
            }
        }

        function showSettings() {
            hideAllScreens();
            document.getElementById("settings-screen").style.display = "block";
        }

        function toggleMusic() {
            if (isMusicPlaying) {
                bgMusic.pause();
                isMusicPlaying = false;
                document.getElementById("musicBtn").innerText = "Nyalakan Musik";
            } else {
                bgMusic.play().catch(e => console.log("Interaksi dibutuhkan."));
                isMusicPlaying = true;
                document.getElementById("musicBtn").innerText = "Matikan Musik";
            }
        }

        function startGame() {
            if (!isMusicPlaying) {
                bgMusic.volume = 0.15;
                bgMusic.play().then(() => isMusicPlaying = true).catch(e => console.log("Autoplay diblokir"));
            }
            selectedDuration = parseInt(document.getElementById("timeSelect").value);
            timeRemaining = selectedDuration;
            
            currentLevelIndex = 0;
            hideAllScreens();
            document.getElementById("game-screen").style.display = "block";
            
            startTimer();
            loadLevel();
        }

        // Fungsi Timer
        function startTimer() {
            clearInterval(timerInterval);
            updateTimerDisplay();
            timerInterval = setInterval(() => {
                timeRemaining--;
                updateTimerDisplay();
                if (timeRemaining <= 0) {
                    clearInterval(timerInterval);
                    triggerGameOver();
                }
            }, 1000);
        }

        function updateTimerDisplay() {
            const minutes = Math.floor(timeRemaining / 60);
            const seconds = timeRemaining % 60;
            document.getElementById("timerDisplay").innerText = `Waktu: ${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
        }

        function triggerGameOver() {
            hideAllScreens();
            document.getElementById("gameover-screen").style.display = "block";
        }

        // ================= ALGORITMA GENERATOR GRID ACAK (WORD SEARCH ENGINE) =================
        function loadLevel() {
            const levelData = levels[currentLevelIndex];
            document.getElementById("levelDisplay").innerText = "Level " + levelData.level;
            document.getElementById("hintDisplay").innerText = "Tema: " + levelData.theme;
            
            selectedLetters = [];
            foundWords = [];

            // Tampilkan Daftar Kata
            const wordsContainer = document.getElementById("wordsToFind");
            wordsContainer.innerHTML = "";
            levelData.words.forEach(word => {
                const div = document.createElement("div");
                div.className = "word-item";
                div.id = "word-" + word;
                div.innerText = word;
                wordsContainer.appendChild(div);
            });

            // Buat Matrix Kosong ukuran N x N
            gridMatrix = Array(levelData.size).fill(null).map(() => Array(levelData.size).fill(""));

            // Selipkan kata-kata secara acak (Horizontal, Vertikal, Diagonal)
            levelData.words.forEach(word => {
                placeWordRandomly(word, levelData.size);
            });

            // Isi sisa kotak kosong dengan huruf acak A-Z
            const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            for (let r = 0; r < levelData.size; r++) {
                for (let c = 0; c < levelData.size; c++) {
                    if (gridMatrix[r][c] === "") {
                        gridMatrix[r][c] = alphabet[Math.floor(Math.random() * alphabet.length)];
                    }
                }
            }

            // Render ke HTML Grid
            const gridContainer = document.getElementById("grid");
            gridContainer.innerHTML = "";
            gridContainer.style.gridTemplateColumns = `repeat(${levelData.size}, 1fr)`;

            for (let r = 0; r < levelData.size; r++) {
                for (let c = 0; c < levelData.size; c++) {
                    const cell = document.createElement("div");
                    cell.className = "cell";
                    cell.innerText = gridMatrix[r][c];
                    cell.dataset.row = r;
                    cell.dataset.col = c;
                    cell.onclick = () => selectCell(cell, gridMatrix[r][c], r, c);
                    gridContainer.appendChild(cell);
                }
            }
        }

        function placeWordRandomly(word, size) {
            // Arah: 0=Horizontal, 1=Vertikal, 2=Diagonal Turun, 3=Diagonal Naik
            const directions = [0, 1, 2, 3];
            let placed = false;
            let attempts = 0;

            while (!placed && attempts < 100) {
                // Acak tipe arahnya agar tidak monoton horizontal
                const dir = directions[Math.floor(Math.random() * directions.length)];
                let rowStep = 0, colStep = 0;

                if (dir === 0) { colStep = 1; }       // Mendatar kanan
                else if (dir === 1) { rowStep = 1; }  // Menurun bawah
                else if (dir === 2) { rowStep = 1; colStep = 1; } // Diagonal kanan bawah
                else if (dir === 3) { rowStep = -1; colStep = 1; } // Diagonal kanan atas

                // Pilih titik start koordinat secara acak
                const startRow = Math.floor(Math.random() * size);
                const startCol = Math.floor(Math.random() * size);

                // Cek apakah muat di dalam grid batas ukuran
                let canPlace = true;
                for (let i = 0; i < word.length; i++) {
                    const nextR = startRow + (i * rowStep);
                    const nextC = startCol + (i * colStep);

                    if (nextR < 0 || nextR >= size || nextC < 0 || nextC >= size) {
                        canPlace = false; break;
                    }
                    // Jika menabrak kata lain yang hurufnya berbeda, batalkan
                    if (gridMatrix[nextR][nextC] !== "" && gridMatrix[nextR][nextC] !== word[i]) {
                        canPlace = false; break;
                    }
                }

                // Jika lolos seleksi, tempatkan huruf katanya ke dalam matriks
                if (canPlace) {
                    for (let i = 0; i < word.length; i++) {
                        const nextR = startRow + (i * rowStep);
                        const nextC = startCol + (i * colStep);
                        gridMatrix[nextR][nextC] = word[i];
                    }
                    placed = true;
                }
                attempts++;
            }
        }

        // ================= LOGIKA INPUT USER =================
        function selectCell(cell, letter, r, c) {
            if (cell.classList.contains("found")) return;

            const idStr = `${r}-${c}`;
            const position = selectedLetters.findIndex(item => item.id === idStr);

            if (position > -1) {
                cell.classList.remove("selected");
                selectedLetters.splice(position, 1);
            } else {
                cell.classList.add("selected");
                selectedLetters.push({ cell, letter, id: idStr });
            }

            checkSelectedWord();
        }

        function checkSelectedWord() {
            const formedWord = selectedLetters.map(item => item.letter).join("");
            const reverseFormedWord = formedWord.split("").reverse().join("");
            const levelData = levels[currentLevelIndex];

            levelData.words.forEach(word => {
                if ((formedWord === word || reverseFormedWord === word) && !foundWords.includes(word)) {
                    foundWords.push(word);
                    
                    selectedLetters.forEach(item => {
                        item.cell.classList.remove("selected");
                        item.cell.classList.add("found");
                    });
                    
                    document.getElementById("word-" + word).classList.add("crossed");
                    selectedLetters = [];

                    if (foundWords.length === levelData.words.length) {
                        setTimeout(() => {
                            currentLevelIndex++;
                            if (currentLevelIndex < levels.length) {
                                loadLevel();
                            } else {
                                clearInterval(timerInterval);
                                hideAllScreens();
                                document.getElementById("win-screen").style.display = "block";
                            }
                        }, 1000);
                    }
                }
            });
        }

        function clearSelection() {
            selectedLetters.forEach(item => item.cell.classList.remove("selected"));
            selectedLetters = [];
        }

        function exitGame() {
            alert("Terima kasih sudah berkunjung!");
            window.close();
        }
    </script>
</body>
</html>
